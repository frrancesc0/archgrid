    <!-- CALCULADORA DE LUMINARIA -->

    <script>
      function calculateLuminaires() {
    const area = parseFloat(document.getElementById('area').value);
    const luminariaHeight = parseFloat(document.getElementById('luminariaHeight').value);
    const workHeight = parseFloat(document.getElementById('workHeight').value);
    const lux = parseFloat(document.getElementById('lux').value);
    const luminousFlux = parseFloat(document.getElementById('luminousFlux').value);

    const utilization = 0.5;
    const maintenance = 0.8;

    const height = luminariaHeight - workHeight;
    const numberOfLuminaires = (lux * area) / (luminousFlux * utilization * maintenance);
    
    document.getElementById('result').innerText = `${Math.ceil(numberOfLuminaires)} LUMINARIAS`;
}
    </script>
