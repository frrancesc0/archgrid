<section id="cuerpo">


      <div class="container">
        <table>
          <tr>
            <td><input id="input2b" type="number" placeholder="1" oninput="convert(2)"></td>
            <td>
              <select id="unit2b" oninput="convert(2)">
                <option value="ha" title="Hectáreas">ha</option>
                <option value="m2" title="Metros Cuadrados">m²</option>
                <option value="km2" title="Kilómetros Cuadrados">km²</option>
                <option value="cm2" title="Centímetros Cuadrados">cm²</option>
                <option value="mm2" title="Milímetros Cuadrados">mm²</option>
                <option value="ft2" title="Pies Cuadrados">ft²</option>
                <option value="in2" title="Pulgadas Cuadradas">in²</option>
              </select>
            </td>
          </tr>

          <tr>
            <td><input id="input1b" type="number" placeholder="10000" oninput="convert(1)"></td>
            <td>
              <select id="unit1b" oninput="convert(1)">
                <option value="m2" title="Metros Cuadrados">m²</option>
                <option value="km2" title="Kilómetros Cuadrados">km²</option>
                <option value="cm2" title="Centímetros Cuadrados">cm²</option>
                <option value="mm2" title="Milímetros Cuadrados">mm²</option>
                <option value="ha" title="Hectáreas">ha</option>
                <option value="ft2" title="Pies Cuadrados">ft²</option>
                <option value="in2" title="Pulgadas Cuadradas">in²</option>
              </select>
            </td>
          </tr>

        </table>
      </div>
    </section>


    <!-- CONVERTIDOR DE AREAS -->
    
    <script>
      function convert(inputNumber) {
        var unitValues = {
          'm2': 1,
          'km2': 0.000001,
          'cm2': 10000,
          'mm2': 1000000,
          'ha': 0.0001,
          'ft2': 10.764,
          'in2': 1550.003
        };
      
        var input1 = document.getElementById('input1b').value;
        var unit1 = document.getElementById('unit1b').value;
        var input2 = document.getElementById('input2b').value;
        var unit2 = document.getElementById('unit2b').value;
      
        if (inputNumber == 1) {
          var valueInM2 = input1 / unitValues[unit1];  // Convert to square meters
          var output = valueInM2 * unitValues[unit2];  // Convert to output unit
          document.getElementById('input2b').value = output;
        } else if (inputNumber == 2) {
          var valueInM2 = input2 / unitValues[unit2];  // Convert to square meters
          var output = valueInM2 * unitValues[unit1];  // Convert to output unit
          document.getElementById('input1b').value = output;
        }
      }
      </script>


</body>
