<section id="cuerpo">


          <div class="container">


            <table>
              <tr>
                  <td><p>Altura</p></td>
                  <td>
                      <input class="input-3" type="number" id="altura" placeholder="0.12" oninput="limpiar('altura')"/> 
                      <select id="unidadAltura">
                          <option value="1">m</option>
                          <option value="0.01">cm</option>
                      </select>
                  </td>
              </tr>
              <tr>
                  <td><p>Longitud</p></td>
                  <td>
                      <input class="input-3" type="number" id="longitud" placeholder="1" oninput="limpiar('longitud')"/> 
                      <select id="unidadLongitud">
                          <option value="1">m</option>
                          <option value="0.01">cm</option>
                      </select>
                  </td>
              </tr>
              <tr>
                  <td><p>% Pendiente</p></td>
                  <td><input class="input-3" type="number" id="porcentajePendiente" placeholder="12" oninput="limpiar('porcentajePendiente')"/>
                      <button class="button-calcular" onclick="calcular()">=</button>
                  </td>
              </tr>
          </table>

          
          
</section>





<!-- SCRIPTS CALCULADORA DE PENDIENTE -->


    
    <script>
function limpiar(campo) {
    if (campo === 'altura') {
        if (document.getElementById('longitud').value && document.getElementById('porcentajePendiente').value) {
            document.getElementById('longitud').value = '';
            document.getElementById('porcentajePendiente').value = '';
        }
    } else if (campo === 'longitud') {
        if (document.getElementById('altura').value && document.getElementById('porcentajePendiente').value) {
            document.getElementById('altura').value = '';
            document.getElementById('porcentajePendiente').value = '';
        }
    } else if (campo === 'porcentajePendiente') {
        if (document.getElementById('altura').value && document.getElementById('longitud').value) {
            document.getElementById('altura').value = '';
            document.getElementById('longitud').value = '';
        }
    }
}

function calcular() {
    const altura = parseFloat(document.getElementById('altura').value);
    const longitud = parseFloat(document.getElementById('longitud').value);
    const porcentajePendiente = parseFloat(document.getElementById('porcentajePendiente').value);
    const unidadAltura = parseFloat(document.getElementById('unidadAltura').value);
    const unidadLongitud = parseFloat(document.getElementById('unidadLongitud').value);

    if (!isNaN(altura) && !isNaN(longitud) && isNaN(porcentajePendiente)) {
        const pendienteCalculada = (altura * unidadAltura) / (longitud * unidadLongitud) * 100;
        document.getElementById('porcentajePendiente').value = pendienteCalculada.toFixed(2);
    } else if (!isNaN(altura) && !isNaN(porcentajePendiente) && isNaN(longitud)) {
        const longitudCalculada = (altura * unidadAltura) / (porcentajePendiente / 100) / unidadLongitud;
        document.getElementById('longitud').value = longitudCalculada.toFixed(2);
    } else if (!isNaN(longitud) && !isNaN(porcentajePendiente) && isNaN(altura)) {
        const alturaCalculada = (porcentajePendiente / 100) * (longitud * unidadLongitud) / unidadAltura;
        document.getElementById('altura').value = alturaCalculada.toFixed(2);
    } else {
        alert('Por favor, ingresa al menos dos valores para calcular el tercero. Si ya ingresaste dos valores, borra el tercero.');
    }
}
</script>
