      <div class="container">

          <tr>

                <input type="number" placeholder="1000" id="input11" oninput="convertir()">
                <select id="unit21" onchange="convertir()">

          <tr>
              <td>
      <input type="number" placeholder="1" id="input21" oninput="convertir()">
                <select id="unit11" onchange="convertir()">
                      <option value="km" title="Kilómetro">km</option>
                      <option value="m" title="Metro">m</option>
                      <option value="cm" title="Centímetro">cm</option>

                      <option value="nm" title="Nanómetro">nm</option>

                      <option value="mi" title="Milla">mi</option>
                      <option value="yd" title="Yarda">yd</option>
                      <option value="ft" title="Pie">ft</option>
                      <option value="in" title="Pulgada">in</option>
                  </select>
              </td>
          </tr>

    <!-- CONVERTIDOR DE LONGITUD -->
    
    <script>
      var factorescl = {
          "km": 0.001,
          "m": 1,
          "cm": 100,
          "mm": 1000,
          "dm": 10,
          "hm": 0.01,
          "μm": 1000000,
          "nm": 1000000000,
          "pm": 1000000000000,
          "mi": 0.000621371,
          "yd": 1.09361,
          "ft": 3.2808398950131233,
          "in": 39.37007874015748
      };
    
      function convertir() {
          var input1 = document.getElementById("input11");
          var input2 = document.getElementById("input21");
          var unit1 = document.getElementById("unit11");
          var unit2 = document.getElementById("unit21");
    
          if (document.activeElement === input1) {
              input2.value = (input1.value * factorescl[unit1.value] / factorescl[unit2.value]);
          } else {
              input1.value = (input2.value * factorescl[unit2.value] / factorescl[unit1.value]);
          }
      }
    </script>
