<section id="cuerpo">


        <div class="container">
          <table>
            <tr>
              <td>
              <input type="number" placeholder="1" id="input13" oninput="convertir1()">
              <select id="unit23" onchange="convertir1()">
              <option value="px" title="Pixeles">px</option>

            <tr>
              <td>
              <input type="number" placeholder="0.26458" id="input23" oninput="convertir1()">
              <select id="unit13" onchange="convertir1()">
              <option value="mm" title="Milímetros">mm</option>
              <option value="px" title="Pixeles">px</option>
              <option value="pt" title="Puntos">pt</option>

<!-- CONVERTIDOR DE UNIDADES DIGITALES -->
    
    
    
    
    <script>
      var factores = {
          "m": 1,
          "cm": 100,
          "mm": 1000,
          "in": 39.37007874015748,
          "px": 3779.5275590551,
          "pt": 2834.6456692913
      };
    
      function convertir1() {
          var input1 = document.getElementById("input13");
          var input2 = document.getElementById("input23");
          var unit1 = document.getElementById("unit13");
          var unit2 = document.getElementById("unit23");
    
          if (document.activeElement === input1) {
              input2.value = (input1.value * factores[unit1.value] / factores[unit2.value]);
          } else {
              input1.value = (input2.value * factores[unit2.value] / factores[unit1.value]);
          }
      }
    </script>
